name: Windows MSVC Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
            submodules: recursive
                
      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git vcpkg

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat
        
      - name: Get MSVC version
        id: msvc
        shell: pwsh
        run: |
            $cl = (Get-Command cl.exe).Source
            $ver = (Get-Item $cl).VersionInfo.ProductVersion
            "version=$ver" >> $env:GITHUB_OUTPUT
    
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
            path: |
              ${{ github.workspace }}/vcpkg_installed
            key: vcpkg-${{ runner.os }}-${{ steps.msvc.outputs.version }}-${{ hashFiles('vcpkg.json') }}
            restore-keys: |
              vcpkg-${{ runner.os }}-${{ steps.msvc.outputs.version }}-
              vcpkg-${{ runner.os }}-
              
      - name: Install Dependencies
        run: .\vcpkg\vcpkg.exe install --triplet x64-windows
                  
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: msbuild numetron.sln /p:Configuration=Release

      - name: Run tests
        run: |
          cd x64/Release
          $env:PATH += ";${{ github.workspace }}\vcpkg_installed\x64-windows\bin"
          .\numetron_tests.exe
